kind = "web"
previewPath = "/"
title = "VisionTrack"
version = "1.0.0"
id = "artifacts/visiontrack"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23832

[services.development]
run = "pnpm --filter @workspace/visiontrack run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/visiontrack", "run", "build" ]
publicDir = "artifacts/visiontrack/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23832"
BASE_PATH = "/"
